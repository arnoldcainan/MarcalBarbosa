{% extends 'base.html' %} {% block content %}
  <div class="container mt-5">
    <h2>Confirmar Exclusão</h2>

    <p>Você tem certeza que deseja deletar o contato <strong>{{ object.nome }}</strong>?</p>

    <form method="POST">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Sim, quero deletar</button>
      <a href="{% url 'lista_contatos' %}" class="btn btn-secondary">Cancelar</a>
    </form>
  </div>
{% endblock %}
